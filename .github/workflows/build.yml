name: Build kdmapper
on: [push]
jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        
      - name: Build
        run: |
          msbuild kdmapper.sln /p:Configuration=Release /p:Platform=x64 /p:VisualStudioVersion=17.0
          
      # 使用正確的 PowerShell 指令來列出檔案
      - name: Find compiled files
        shell: powershell
        run: Get-ChildItem -Recurse -Filter *.exe | Select-Object -ExpandProperty FullName
        
      - name: Upload kdmapper
        uses: actions/upload-artifact@v4
        with:
          name: kdmapper-binary
          path: |
            **/kdmapper.exe
            **/kdmapper_x64.exe