name: Build kdmapper
on: [push]
jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v3
      - name: Build
        run: |
          msbuild kdmapper.sln /p:Configuration=Release /p:Platform=x64 /p:VisualStudioVersion=17.0 /p:UseWDK=true
      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: kdmapper-binary
          path: x64/Release/kdmapper.exe