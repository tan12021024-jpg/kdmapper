name: Build kdmapper
on: [push]
jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        
      - name: Build
        run: |
          msbuild kdmapper.sln /p:Configuration=Release /p:Platform=x64 /p:VisualStudioVersion=17.0
          
      - name: Upload kdmapper
        uses: actions/upload-artifact@v4
        with:
          name: kdmapper-binary
          path: x64/Release/kdmapper_Release.exe